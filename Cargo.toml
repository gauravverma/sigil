[package]
name = "sigil"
version = "0.1.0"
edition = "2021"

[dependencies]
codeix = { git = "https://github.com/montanetech/codeix", tag = "v0.5.0" }
anyhow = "1"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
colored = "3"
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
serde_yaml = "0.9"
ignore = "0.4"
similar = "2"
