name: Release (full binary)

# Builds `sigil-full-<target>.{tar.gz,zip}` for each supported platform with
# `--features db,tokenizer` and attaches them to the same GitHub Release that
# `release.yml` (cargo-dist) creates for the lean default build.
#
# Triggers on the same semver tag pattern as release.yml so both sets of
# artifacts land on one release page.

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build-full:
    name: build-full (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-full-${{ matrix.target }}
          shared-key: release-full

      - name: Build (full features)
        run: cargo build --release --features db,tokenizer --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          STAGE="sigil-full-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/sigil" "$STAGE/"
          cp scripts/git-sigil "$STAGE/" 2>/dev/null || true
          cp README.md LICENSE CHANGELOG.md "$STAGE/" 2>/dev/null || true
          tar -czf "$STAGE.tar.gz" "$STAGE"
          echo "ASSET=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "sigil-full-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/sigil.exe" "$stage/"
          Copy-Item README.md, LICENSE, CHANGELOG.md "$stage/" -ErrorAction SilentlyContinue
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ASSET=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Wait for release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # release.yml (cargo-dist) creates the GitHub Release. Poll for up to
          # 30 minutes so this job can run in parallel without racing.
          for i in $(seq 1 60); do
            if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
              echo "release ${{ github.ref_name }} is ready"
              exit 0
            fi
            echo "waiting for release ${{ github.ref_name }} (attempt $i/60)"
            sleep 30
          done
          echo "timed out waiting for release" >&2
          exit 1

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "${ASSET}" --clobber
